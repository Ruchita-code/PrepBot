<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1a1f2e"/>

  <!-- Antenna -->
  <line x1="32" y1="14" x2="32" y2="8" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="6" r="3" fill="#06d6a0"/>
  <circle cx="32" cy="6" r="1.5" fill="#1a1f2e"/>

  <!-- Head -->
  <rect x="10" y="16" width="44" height="34" rx="8" fill="#242b3d" stroke="#4f8ef7" stroke-width="1.5"/>

  <!-- Face panel -->
  <rect x="16" y="21" width="32" height="24" rx="5" fill="#1a1f2e" stroke="#4f8ef7" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="26" cy="31" r="5" fill="#4f8ef7"/>
  <circle cx="38" cy="31" r="5" fill="#06d6a0"/>
  <circle cx="28" cy="29" r="1.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="40" cy="29" r="1.8" fill="#ffffff" opacity="0.9"/>

  <!-- Signal bar mouth -->
  <rect x="18" y="38" width="4" height="3" rx="1" fill="#4f8ef7" opacity="0.5"/>
  <rect x="24" y="36" width="4" height="5" rx="1" fill="#4f8ef7" opacity="0.7"/>
  <rect x="30" y="34" width="4" height="7" rx="1" fill="#06d6a0" opacity="0.95"/>
  <rect x="36" y="36" width="4" height="5" rx="1" fill="#4f8ef7" opacity="0.6"/>
  <rect x="42" y="37" width="4" height="4" rx="1" fill="#4f8ef7" opacity="0.45"/>

  <!-- Ear bolts -->
  <circle cx="10" cy="31" r="3" fill="#2d3652" stroke="#4f8ef7" stroke-width="1"/>
  <circle cx="54" cy="31" r="3" fill="#2d3652" stroke="#4f8ef7" stroke-width="1"/>

  <!-- Neck -->
  <rect x="26" y="50" width="12" height="5" rx="2.5" fill="#2d3652" stroke="#4f8ef7" stroke-width="1"/>

  <!-- Body -->
  <rect x="14" y="55" width="36" height="6" rx="4" fill="#242b3d" stroke="#4f8ef7" stroke-width="1"/>
</svg>
